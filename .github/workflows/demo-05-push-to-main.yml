name: Demo 05 - Push To Main

on:
  workflow_dispatch:
  push:
    branches: 
      - main

jobs:
  build-app:
    name: "Build App"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build step
        run: |
          echo "Building the application..."
          echo "Build completed successfully!"

      - name: Test step
        run: |
          echo "Running unit tests..."
          echo "All tests passed!"

  deploy-DEV:
    name: "Deploy To Azure DEV env"
    runs-on: ubuntu-latest
    needs:
      - build-app
    environment:
      name: 'DEV'
    steps:
      - name: Deploy to DEV
        run: |
          echo "Deploying to DEV environment..."
          echo "Application deployed to DEV successfully!"
          echo "URL: https://mywebapp-dev.example.com"

  deploy-QA:
    name: "Deploy To Azure QA env"
    runs-on: ubuntu-latest
    needs:
      - build-app
    environment:
      name: 'QA'
    steps:
      - name: Deploy to QA
        run: |
          echo "Deploying to QA environment..."
          echo "Application deployed to QA successfully!"
          echo "URL: https://mywebapp-qa.example.com"

  deploy-PROD:
    name: "Deploy To Azure PROD env"
    runs-on: ubuntu-latest
    needs:
      - deploy-DEV
      - deploy-QA
    steps:
      - name: Deploy to PROD
        run: |
          echo "Deploying to PROD environment..."
          echo "Application deployed to PROD successfully!"
